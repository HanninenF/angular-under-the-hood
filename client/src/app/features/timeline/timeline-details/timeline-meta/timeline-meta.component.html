@if (selectedEvent) {
  <dl class="details__meta">
    <div>
      <dt>Category</dt>
      <dd class="source">{{ selectedEvent.category }}</dd>
    </div>

    <div>
      <dt>Source</dt>
      <dd class="source">{{ selectedEvent.source }}</dd>
    </div>

    @if (selectedEvent.correlationId) {
      <div>
        <dt>Correlation</dt>
        <dd class="source">
          <button
            class="correlation-button"
            type="button"
            (click)="filterByCorrelationId.emit(selectedEvent.correlationId)"
          >
            {{ selectedEvent.correlationId }}
          </button>
        </dd>
      </div>
    }

    @if (
      selectedEvent.durationMs !== undefined &&
      selectedEvent.durationMs !== null
    ) {
      <div>
        <dt>Duration</dt>
        <dd class="source">{{ selectedEvent.durationMs }}ms</dd>
      </div>
    }
  </dl>
}
