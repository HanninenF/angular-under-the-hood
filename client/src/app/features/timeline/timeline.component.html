<header class="toolbar">
  <div>
    <h1 class="title">Timeline</h1>
    <p class="subtitle">Level 0 — events i realtid</p>
  </div>

  <button class="btn" type="button" (click)="clear()">Clear</button>
</header>

<div class="content">
  <app-timeline-list
    [events$]="events$"
    [selectedEvent]="selectedEvent"
    (selectEvent)="selectEvent($event)"
  ></app-timeline-list>

  <app-timeline-details
    [selectedEvent]="selectedEvent"
    (closeDetails)="closeDetails()"
  ></app-timeline-details>
</div>
