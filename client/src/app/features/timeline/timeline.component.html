<header class="toolbar">
  <div>
    <h1 class="title">Timeline</h1>
    <p class="subtitle">
      Level 0 — events i realtid
      @if (isPaused) {
        <span class="status">Paused</span>
      }
    </p>
  </div>
</header>

<div class="content">
  <div #listViewport class="list-viewport">
    <app-timeline-list
      [events$]="events$"
      [selectedEvent]="selectedEvent"
      (selectEvent)="selectEvent.emit($event)"
    ></app-timeline-list>
  </div>

  <app-timeline-details
    [selectedEvent]="selectedEvent"
    (closeDetails)="closeDetails.emit()"
  ></app-timeline-details>
</div>
