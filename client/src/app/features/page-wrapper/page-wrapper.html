<header class="shell">
  <div class="shell__copy">
    <p class="eyebrow">Level 0</p>
    <h1 class="title">Angular under the hood</h1>
    <p class="subtitle">open console to see körflöde</p>
  </div>

  <nav class="shell__nav" aria-label="Demo navigation">
    <button
      type="button"
      class="nav-button"
      [class.nav-button--active]="activeView === 'timeline'"
      (click)="activeViewChange.emit('timeline')"
    >
      Timeline
    </button>

    <button
      type="button"
      class="nav-button"
      [class.nav-button--active]="activeView === 'settings'"
      (click)="activeViewChange.emit('settings')"
    >
      Settings
    </button>

    <button class="btn" type="button" (click)="toggleDebugOutline.emit()">
      {{ debugOutlineButtonLabel }}
    </button>
  </nav>

  <div class="shell__controls" aria-label="Timeline controls">
    <button class="btn" type="button" (click)="togglePause.emit()">
      {{ pauseButtonLabel }}
    </button>

    <button class="btn" type="button" (click)="toggleAutoScroll.emit()">
      {{ autoScrollButtonLabel }}
    </button>

    <button class="btn" type="button" (click)="clearTimeline.emit()">
      Clear
    </button>
  </div>
</header>

<section class="shell__filters" aria-label="Timeline filters">
  <label class="filter">
    <span>Category</span>
    <select
      #categorySelect
      [value]="timelineFilters.category"
      (change)="setCategory(categorySelect.value)"
    >
      @for (option of categoryOptions; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
      }
    </select>
  </label>

  <label class="filter">
    <span>Level</span>
    <select
      #levelSelect
      [value]="timelineFilters.level"
      (change)="setLevel(levelSelect.value)"
    >
      @for (option of levelOptions; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
      }
    </select>
  </label>

  <label class="filter">
    <span>Search</span>
    <input
      #searchInput
      type="search"
      [value]="timelineFilters.searchText"
      (input)="setSearchText(searchInput.value)"
      placeholder="label, source, payload..."
    />
  </label>

  <label class="filter">
    <span>Correlation</span>
    <input
      #correlationInput
      type="search"
      [value]="timelineFilters.correlationId"
      (input)="setCorrelationId(correlationInput.value)"
      placeholder="full or short id"
    />
  </label>

  <div class="filter filter__actions">
    <button
      class="btn btn--ghost"
      type="button"
      (click)="resetTimelineFilters()"
      [disabled]="!hasActiveTimelineFilters"
    >
      Clear filters
    </button>
  </div>
</section>

<main class="page">
  <ng-content></ng-content>
</main>
