<section class="settings">
  <h2 class="settings__title">Settings</h2>
  <p class="settings__lead">
    This page is a placeholder for demo toggles and environment information.
  </p>

  <dl class="settings__grid">
    <div>
      <dt>Environment</dt>
      <dd>{{ environmentName }}</dd>
    </div>

    <div>
      <dt>Base URL</dt>
      <dd>{{ baseUrl }}</dd>
    </div>

    <div>
      <dt>Storage mode</dt>
      <dd>{{ storageMode }}</dd>
    </div>
  </dl>
</section>
