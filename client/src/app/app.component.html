<app-page-wrapper
  [activeView]="activeView"
  [isDebugOutlineEnabled]="isDebugOutlineEnabled"
  [isPaused]="isPaused"
  [isAutoScrollEnabled]="isAutoScrollEnabled"
  [timelineFilters]="timelineFilters"
  (activeViewChange)="setActiveView($event)"
  (toggleDebugOutline)="toggleDebugOutline()"
  (togglePause)="togglePause()"
  (toggleAutoScroll)="toggleAutoScroll()"
  (clearTimeline)="clearTimeline()"
  (timelineFiltersChange)="setTimelineFilters($event)"
  (clearTimelineFilters)="clearTimelineFilters()"
>
  @if (activeView === 'timeline') {
    <app-timeline
      [events$]="timelineEvents$"
      [selectedEvent]="selectedEvent"
      [isPaused]="isPaused"
      [isAutoScrollEnabled]="isAutoScrollEnabled"
      (selectEvent)="selectEvent($event)"
      (closeDetails)="closeDetails()"
      (filterByCorrelationId)="applyCorrelationFilter($event)"
    ></app-timeline>
  }

  @if (activeView === 'settings') {
    <app-settings></app-settings>
  }
</app-page-wrapper>
